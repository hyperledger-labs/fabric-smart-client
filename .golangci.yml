---
version: "2"
linters:
  enable:
    - thelper
    - tparallel
    - paralleltest
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
run:
  allow-parallel-runners: true
